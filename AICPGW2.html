<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Homework Helper | Section 4.2</title>
    <style>
        body { background: #121212; color: #8ba8ca; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        nav { background: #1a1a1a; padding: 20px; border-bottom: 2px solid #8ba8ca; font-weight: bold; font-size: 1.2rem; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            padding: 30px; 
            max-width: 1000px; 
            margin: auto; 
        }

        .card { 
            background: #252525; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 1px solid #333; 
            transition: 0.3s; 
        }

        .card:hover { border-color: #8ba8ca; transform: translateY(-5px); background: #2a2a2a; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .card span { font-weight: bold; display: block; margin-top: 5px; }

        /* The Game Overlay */
        #portal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: black; 
            z-index: 100; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            background: #8ba8ca; 
            color: black; 
            padding: 8px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            z-index: 101;
        }
    </style>
</head>
<body>

<nav>UNIT 4: ADVANCED CALCULUS RESOURCES</nav>

<div class="grid">
    <div class="card" onclick="launch('https://education-og.github.io/unblocked-games/subway-surfers/')">
        <img src="https://img.poki.com/cdn-cgi/image/quality=70,width=204,height=204,fit=cover,f=auto/v2/fb30a086884841968840742f56738914.png">
        <span>Assignment 01</span>
    </div>

    <div class="card" onclick="launch('https://education-og.github.io/unblocked-games/monkey-mart/')">
        <img src="https://img.poki.com/cdn-cgi/image/quality=70,width=204,height=204,fit=cover,f=auto/v2/75185469493f0b24050965e6f6631863.png">
        <span>Assignment 02</span>
    </div>
</div>

<div id="portal">
    <div class="close-btn" onclick="closePortal()">CLOSE [X]</div>
    <iframe id="viewer" src=""></iframe>
</div>
    <script src="https://ultraviolet-static-opal.vercel.app/uv/uv.bundle.js"></script>
<script src="https://ultraviolet-static-opal.vercel.app/uv/uv.config.js"></script>

<script>
    function launch(targetUrl) {
        const p = document.getElementById('portal');
        const v = document.getElementById('viewer');
        
        // This is the "Magic Handshake"
        // It uses the instructions we just imported from Vercel
        const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
        v.src = "https://ultraviolet-static-opal.vercel.app" + encodedUrl;
        
        p.style.display = 'block';
    }

    function closePortal() {
        document.getElementById('portal').style.display = 'none';
        document.getElementById('viewer').src = "";
    }
</script>

</body>
</html>
